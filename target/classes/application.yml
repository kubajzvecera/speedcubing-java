spring:
  application:
    name: speedcubing
  datasource:
    url: jdbc:h2:file:./data/speedcubing;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
      jakarta:
        persistence:
          schema-generation:
            database:
              action: update

server:
  port: 8080
