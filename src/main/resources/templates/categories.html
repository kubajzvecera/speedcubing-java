<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Categories</h1>
    <a href="/" class="btn btn-secondary mb-3">Back</a>

    <h3>Add Category</h3>
    <form action="#" th:action="@{/categories}" method="post" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="name" class="form-control" placeholder="Category name (e.g. 3x3x3)" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.name}">name</td>
            <td>
                <form action="#" th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
