<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Round Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${round.name}">round name</h1>
    <a th:href="@{/competitions/{id}(id=${round.competition.id})}" class="btn btn-secondary mb-3">Back</a>

    <h3>Add Solve</h3>
    <form action="#" th:action="@{/rounds/{id}/solves(id=${round.id})}" method="post" class="row g-3 mb-4">
        <div class="col-auto">
            <select name="competitorId" class="form-select" required>
                <option th:each="c : ${competitors}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <div class="col-auto">
            <input type="number" name="attemptNumber" class="form-control" placeholder="Attempt (1-5)" min="1" max="5" required>
        </div>
        <div class="col-auto">
            <input type="number" name="timeMs" class="form-control" placeholder="Time (ms)" min="0" required>
        </div>
        <div class="col-auto">
            <select name="penalty" class="form-select">
                <option value="">None</option>
                <option value="+2">+2</option>
                <option value="DNF">DNF</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <h3>Solves</h3>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Competitor</th>
            <th>Attempt</th>
            <th>Time (ms)</th>
            <th>Penalty</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${solves}">
            <td th:text="${s.competitor.name}">name</td>
            <td th:text="${s.attemptNumber}">attempt</td>
            <td th:text="${s.timeMs}">time</td>
            <td th:text="${s.penalty}">penalty</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/results/{roundId}(roundId=${round.id})}" class="btn btn-success">View Results</a>
</div>
</body>
</html>
