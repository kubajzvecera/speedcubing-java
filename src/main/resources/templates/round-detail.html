<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Round Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${round.name}">round name</h1>
    <a th:if="${competitionId != null}" th:href="@{/competitions/{id}(id=${competitionId})}" class="btn btn-secondary mb-3">Back to Competition</a>
    <a th:if="${competitionId == null}" href="/competitions" class="btn btn-secondary mb-3">Back to Competitions</a>

    <h3>Add Solve</h3>
    <div th:if="${hasResults}" class="alert alert-info">Results already generated – adding more solves is disabled.</div>
    <form th:unless="${hasResults}" action="#" th:action="@{/rounds/{id}/solves(id=${round.id})}" th:object="${solveForm}" method="post" class="row g-3 mb-4">
        <input type="hidden" th:field="*{competitionId}" th:value="${competitionId}" />
        <div class="col-auto">
            <select th:field="*{competitorId}" class="form-select" required>
                <option th:each="c : ${competitors}" th:value="${c.id}" th:text="${c.firstName + ' ' + c.lastName}"></option>
            </select>
        </div>
        <div class="col-auto">
            <input type="number" th:field="*{timeMs}" class="form-control" placeholder="Time (ms)" min="0" required>
        </div>
        <div class="col-auto">
            <select th:field="*{penalty}" class="form-select">
                <option value="">None</option>
                <option value="+2">+2</option>
                <option value="DNF">DNF</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <h3>Solves</h3>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Competitor</th>
            <th>Attempt</th>
            <th>Time</th>
            <th>Penalty</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${solves}">
            <td th:text="${s.competitor.firstName + ' ' + s.competitor.lastName}">name</td>
            <td th:text="${s.attemptNumber}">attempt</td>
            <td th:text="${@timeUtils.format(s.timeMs)}">time</td>
            <td th:text="${s.penalty ?: '-'}">penalty</td>
            <td>
                <form action="#" th:action="@{/solves/{id}/delete(id=${s.id})}" method="post" style="display:inline">
                    <input type="hidden" name="competitionId" th:value="${competitionId}" />
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
