<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competition Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${competition.name}">name</h1>
    <p>
        Date: <span th:text="${competition.date}">date</span>
        | Location: <span th:text="${competition.location}">loc</span>
        | End: <span th:text="${competition.endDate ?: '-'}">end</span>
    </p>
    <a href="/competitions" class="btn btn-secondary mb-3">Back</a>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}">error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Categories -->
    <h3>Categories</h3>

    <!-- Add round (works even when no categories exist yet) -->
    <form action="#" th:action="@{/competitions/{id}/add-round(id=${competition.id})}" method="post" class="row g-2 mb-4">
        <div class="col-auto">
            <select name="categoryId" class="form-select form-select-sm" required>
                <option value="">-- Select category --</option>
                <option th:each="cat : ${allCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="name" class="form-control form-control-sm" placeholder="Round name" required>
        </div>
        <div class="col-auto">
            <input type="number" name="roundNumber" class="form-control form-control-sm" placeholder="Number" min="1" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-primary">Add Round</button>
        </div>
    </form>

    <div th:unless="${#lists.isEmpty(competition.categories)}">
        <div th:each="cat : ${competition.categories}" class="card mb-3">
            <div class="card-header">
                <strong th:text="${cat.name}">category</strong>
            </div>
            <div class="card-body">

                <!-- Rounds -->
                <div th:if="${not #lists.isEmpty(roundsByCategory.get(cat.id))}">
                    <div th:each="r : ${roundsByCategory.get(cat.id)}" class="round-section mb-3 p-3 border rounded">
                        <div class="d-flex align-items-center mb-2">
                            <h5 class="mb-0 me-3" th:text="${r.name}">Round name</h5>
                            <span class="badge bg-secondary me-3" th:text="'#' + ${r.roundNumber}">#</span>
                            <div class="ms-auto">
                                <a th:href="@{/rounds/{id}(id=${r.id}, competitionId=${competition.id})}" class="btn btn-sm btn-info me-2">Solves</a>
                                <form action="#" th:action="@{/results/generate/{roundId}(roundId=${r.id})}" method="post" style="display:inline" th:if="${resultsByRound.get(r.id) == null}">
                                    <input type="hidden" name="competitionId" th:value="${competition.id}" />
                                    <button type="submit" class="btn btn-sm btn-warning me-2">Generate Ao5</button>
                                </form>
                                <span th:if="${resultsByRound.get(r.id) != null}" class="text-muted me-2">Results published</span>
                                <form action="#" th:action="@{/rounds/{id}/delete(id=${r.id})}" method="post" style="display:inline">
                                    <input type="hidden" name="competitionId" th:value="${competition.id}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                </form>
                            </div>
                        </div>
                        <div th:if="${resultsByRound.get(r.id) != null}">
                            <table class="table table-sm table-bordered mb-0 bg-light">
                                <thead class="table-success">
                                    <tr>
                                        <th>Rank</th>
                                        <th>Competitor</th>
                                        <th>Best</th>
                                        <th>Average</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="res : ${resultsByRound.get(r.id)}">
                                        <td th:text="${res.rank}">rank</td>
                                        <td th:text="${res.competitor.firstName + ' ' + res.competitor.lastName}">name</td>
                                        <td th:text="${@timeConvert.format(res.bestTime)}">best</td>
                                        <td th:text="${@timeConvert.format(res.averageTime)}">avg</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(competition.categories)}" class="text-muted">No categories yet.</p>

</div>
</body>
</html>
