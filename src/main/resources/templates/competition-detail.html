<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competition Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${competition.name}">name</h1>
    <p>
        Date: <span th:text="${competition.date}">date</span>
        | Location: <span th:text="${competition.location}">loc</span>
        | End: <span th:text="${competition.endDate ?: '-'}">end</span>
        | Organizer: <span th:text="${competition.organizer != null ? competition.organizer.firstName + ' ' + competition.organizer.lastName : '-'}">org</span>
    </p>
    <a href="/competitions" class="btn btn-secondary mb-3">Back</a>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}">error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Categories -->
    <h3>Categories</h3>

    <div th:unless="${#lists.isEmpty(competition.categories)}">
        <div th:each="cat : ${competition.categories}" class="card mb-3">
            <div class="card-header">
                <strong th:text="${cat.name}">category</strong>
            </div>
            <div class="card-body">

                <!-- Rounds -->
                <table class="table table-sm table-striped mb-3" th:if="${not #lists.isEmpty(cat.rounds)}">

                    <tbody>
                    <th:block th:each="r : ${cat.rounds}">
                        <tr>
                            <td th:text="${r.name}">name</td>
                            <td th:text="${r.roundNumber}">#</td>
                            <td>
                                <a th:if="${resultsByRound.get(r.id) == null}" th:href="@{/rounds/{id}(id=${r.id}, competitionId=${competition.id})}" class="btn btn-sm btn-info">Solves</a>
                                <span th:if="${resultsByRound.get(r.id) != null}" class="text-muted">Done</span>
                            </td>
                            <td>
                                <form action="#" th:action="@{/results/generate/{roundId}(roundId=${r.id})}" method="post" style="display:inline" th:if="${resultsByRound.get(r.id) == null}">
                                    <input type="hidden" name="competitionId" th:value="${competition.id}" />
                                    <button type="submit" class="btn btn-sm btn-warning">Generate Ao5</button>
                                </form>
                                <span th:if="${resultsByRound.get(r.id) != null}" class="text-muted">Results published</span>
                            </td>
                        </tr>
                        <!-- Results table for this round -->
                        <tr th:if="${resultsByRound.get(r.id) != null}">
                            <td colspan="4" class="p-0">
                                <table class="table table-sm table-bordered mb-0 bg-light">
                                    <thead class="table-success">
                                    <tr>
                                        <th>Rank</th>
                                        <th>Competitor</th>
                                        <th>Best (ms)</th>
                                        <th>Average (ms)</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="res : ${resultsByRound.get(r.id)}">
                                        <td th:text="${res.rank}">rank</td>
                                        <td th:text="${res.competitor.firstName + ' ' + res.competitor.lastName}">name</td>
                                        <td th:text="${res.bestTime}">best</td>
                                        <td th:text="${res.averageTime}">avg</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>

                <!-- Add Round -->
                <form action="#" th:action="@{/categories/{id}/rounds(id=${cat.id})}" th:object="${roundForm}" method="post" class="row g-2 mt-2">
                    <input type="hidden" th:field="*{competitionId}" th:value="${competition.id}">
                    <div class="col-auto">
                        <input type="text" th:field="*{name}" class="form-control form-control-sm" placeholder="Round name" required>
                    </div>
                    <div class="col-auto">
                        <input type="number" th:field="*{roundNumber}" class="form-control form-control-sm" placeholder="Number" min="1" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-sm btn-primary">Add Round</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(competition.categories)}" class="text-muted">No categories yet.</p>

    <!-- Registered Competitors -->
    <h4 class="mt-4">Registered Competitors</h4>
    <ul th:if="${not #lists.isEmpty(competition.registrations)}">
        <li th:each="reg : ${competition.registrations}" th:text="${reg.competitor.firstName + ' ' + reg.competitor.lastName}">name</li>
    </ul>
    <p th:if="${#lists.isEmpty(competition.registrations)}" class="text-muted">No competitors registered yet.</p>
</div>
</body>
</html>
