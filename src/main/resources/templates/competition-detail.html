<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competition Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${competition.name}">name</h1>
    <p th:text="'Date: ' + ${competition.date} + ' | Location: ' + ${competition.location}">info</p>
    <a href="/competitions" class="btn btn-secondary mb-3">Back</a>

    <h3>Rounds</h3>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Round</th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${competition.rounds}">
            <td th:text="${r.name}">name</td>
            <td><a th:href="@{/rounds/{id}(id=${r.id})}" class="btn btn-sm btn-info">Solves</a></td>
            <td><a th:href="@{/results/{roundId}(roundId=${r.id})}" class="btn btn-sm btn-success">Results</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
