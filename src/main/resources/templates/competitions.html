<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competitions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Competitions</h1>
    <a href="/" class="btn btn-secondary mb-3">Back</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Location</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${competitions}">
            <td th:text="${c.name}">name</td>
            <td th:text="${c.date}">date</td>
            <td th:text="${c.location}">location</td>
            <td><a th:href="@{/competitions/{id}(id=${c.id})}" class="btn btn-sm btn-info">Detail</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
