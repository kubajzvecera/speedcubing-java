<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="'Results: ' + ${round.name}">results</h1>
    <a th:if="${competitionId != null}" th:href="@{/competitions/{id}(id=${competitionId})}" class="btn btn-secondary mb-3">Back to Competition</a>
    <a th:if="${competitionId == null}" href="/competitions" class="btn btn-secondary mb-3">Back to Competitions</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Rank</th>
            <th>Competitor</th>
            <th>Best</th>
            <th>Average</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${results}">
            <td th:text="${r.rank}">rank</td>
            <td th:text="${r.competitor.firstName + ' ' + r.competitor.lastName}">name</td>
            <td th:text="${@timeUtils.format(r.bestTime)}">best</td>
            <td th:text="${@timeUtils.format(r.averageTime)}">avg</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
