<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organizers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Organizers</h1>
    <a href="/" class="btn btn-secondary mb-3">Back</a>

    <h3>Add Organizer</h3>
    <form action="#" th:action="@{/organizers}" method="post" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="firstName" class="form-control" placeholder="First name" required>
        </div>
        <div class="col-auto">
            <input type="text" name="lastName" class="form-control" placeholder="Last name" required>
        </div>
        <div class="col-auto">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${organizers}">
            <td th:text="${o.firstName}">first</td>
            <td th:text="${o.lastName}">last</td>
            <td th:text="${o.email}">email</td>
            <td>
                <form action="#" th:action="@{/organizers/{id}/delete(id=${o.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
