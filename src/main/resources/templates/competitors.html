<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competitors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Competitors</h1>
    <a href="/" class="btn btn-secondary mb-3">Back</a>

    <h3>Add Competitor</h3>
    <form action="#" th:action="@{/competitors}" th:object="${form}" method="post" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" th:field="*{firstName}" class="form-control" placeholder="First name" required>
        </div>
        <div class="col-auto">
            <input type="text" th:field="*{lastName}" class="form-control" placeholder="Last name" required>
        </div>
        <div class="col-auto">
            <input type="email" th:field="*{email}" class="form-control" placeholder="Email">
        </div>
        <div class="col-auto">
            <input type="date" th:field="*{birthDate}" class="form-control" placeholder="Birth date">
        </div>
        <div class="col-auto">
            <input type="text" th:field="*{country}" class="form-control" placeholder="Country" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Birth Date</th>
            <th>Country</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${competitors}">
            <td><a th:href="@{/competitors/{id}(id=${c.id})}" th:text="${c.firstName + ' ' + c.lastName}">name</a></td>
            <td th:text="${c.email}">email</td>
            <td th:text="${c.birthDate}">birth</td>
            <td th:text="${c.country}">country</td>
            <td>
                <form action="#" th:action="@{/competitors/{id}/delete(id=${c.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
